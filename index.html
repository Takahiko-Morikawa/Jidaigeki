<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>時代劇 ネコ忍者サバイバル Ver 1.39</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Hiragino Mincho ProN', 'MS Mincho', serif; touch-action: none; }
        canvas { display: block; touch-action: none; background: #000; margin: 0 auto; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .screen-text { text-align: center; pointer-events: auto; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 100; color: #fff; background: #000; }
        .version-tag { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 14px; color: #fff; font-family: sans-serif; pointer-events: none; opacity: 0.7; }
        #hp-display { position: absolute; top: 10px; left: 10px; font-size: 24px; color: #ff4757; pointer-events: none; font-weight: bold; font-family: sans-serif; z-index: 50; }
        .ui-btn { padding: 12px 24px; background: rgba(255,255,255,0.2); color: #fff; border: 2px solid #fff; pointer-events: auto; cursor: pointer; font-weight: bold; z-index: 60; font-family: sans-serif; border-radius: 4px; }
        .ui-btn:hover { background: rgba(255,255,255,0.4); }
        #pause-container { position: absolute; top: 10px; right: 10px; display: flex; gap: 10px; pointer-events: none; }
        #pause-container .ui-btn { pointer-events: auto; }
        #pause-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 70; pointer-events: none; }
        #pause-text { position: absolute; top: 25%; left: 50%; transform: translateX(-50%); font-size: 44px; color: #fff; font-weight: bold; animation: blink 0.8s infinite; text-align: center; width: 100%; }
        #confirm-dialog { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); display: none; flex-direction: column; align-items: center; gap: 20px; z-index: 75; pointer-events: auto; background: rgba(20,20,20,0.95); padding: 30px 50px; border: 2px solid #fff; border-radius: 10px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.1; } 100% { opacity: 1; } }
        #overlay-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; color: #fff; display: none; text-shadow: 2px 2px 4px #000; font-weight: bold; z-index: 80; pointer-events: none; }
        .ending-subtext { font-size: 22px; color: #fff; margin-top: 20px; display: none; }
        #stun-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #ff69b4; font-size: 28px; font-weight: bold; text-shadow: 2px 2px 0 #000; display: none; z-index: 45; pointer-events: none; animation: blink 0.5s infinite; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="hp-display" style="display:none;">HP: ❤️❤️❤️</div>
        <div id="stun-msg">つきまとわれて攻撃できない！</div>
        
        <div id="pause-container" style="display:none;">
            <div class="ui-btn" onclick="showExitConfirm()">タイトル画面に戻る</div>
            <div class="ui-btn" onclick="togglePause()">一時休息</div>
        </div>

        <div id="pause-overlay"><div id="pause-text">一時休息</div></div>

        <div id="confirm-dialog">
            <p style="color:white; font-size:24px; margin:0 0 10px 0; font-weight: bold;">タイトル画面に戻る</p>
            <div style="display:flex; gap:30px;">
                <div class="ui-btn" onclick="resetToTitle()">はい</div>
                <div class="ui-btn" onclick="hideExitConfirm()">いいえ</div>
            </div>
        </div>

        <div id="overlay-text"></div>

        <div id="title-screen" class="screen-text">
            <p style="font-size: 20px; color: #aaa; margin-bottom: -10px; letter-spacing: 0.8em; font-weight: bold;">― 時代劇 ―</p>
            <h1 style="font-size: 48px; margin-bottom: 50px; border-top: 3px solid #fff; padding: 25px 0; letter-spacing: 0.1em; border-bottom: none;">ネコ忍者サバイバル</h1>
            <div class="ui-btn" style="width: 180px; font-size: 24px; background: #fff; color: #000; border: none;" onclick="startGame()">新規開始</div>
            <div class="version-tag">Ver 1.39</div>
        </div>

        <div id="gameover-screen" class="screen-text" style="display:none;" onclick="resetToTitle()">
            <h1 style="font-size: 60px;">GAME OVER</h1>
            <p style="font-size: 20px; color: #ff4757;">タップしてタイトルへ</p>
        </div>

        <div id="end-screen" class="screen-text" style="display:none;" onclick="onEndingClick()">
            <h1 id="end-main-text" style="font-size: 80px; letter-spacing: 0.2em;">終劇</h1>
            <p id="end-sub-text" class="ending-subtext">プレイしていただきありがとうございます</p>
            <p id="end-return-hint" style="font-size: 18px; color: #888; margin-top: 40px; display:none;">タップしてタイトルへ</p>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = { title: document.getElementById('title-screen'), end: document.getElementById('end-screen'), endMain: document.getElementById('end-main-text'), endSub: document.getElementById('end-sub-text'), endHint: document.getElementById('end-return-hint'), over: document.getElementById('gameover-screen'), hp: document.getElementById('hp-display'), overlay: document.getElementById('overlay-text'), pauseContainer: document.getElementById('pause-container'), pauseOverlay: document.getElementById('pause-overlay'), confirmDialog: document.getElementById('confirm-dialog'), stunMsg: document.getElementById('stun-msg') };

        const MAP_SIZE = 1500;
        let gameState = 'TITLE', isPaused = false, currentStage = 1;
        let player, enemies = [], effects = [], particles = [], projectiles = [];
        let objects = [], items = [];
        let joystick = { active: false, startX: 0, startY: 0, curX: 0, curY: 0 };
        let camera = { x: 0, y: 0 };
        let frameCount = 0, finalPhase = 0, endingPhase = 0, endingTimer = 0;
        let groundPattern = null, wastelandPattern = null;

        const playerImg = new Image(); playerImg.src = 'player_cat_ninja.png';
        const enemyImg = new Image(); enemyImg.src = 'enemy_black_ninja.png';
        const yojimboImg = new Image(); yojimboImg.src = 'yojimbo.png';
        const shinonomeImg = new Image(); shinonomeImg.src = 'yukinonna.png';
        const okyoImg = new Image(); okyoImg.src = 'okyo.png';
        const teppoImg = new Image(); teppoImg.src = '固定鉄砲隊.png';
        const jizoImg = new Image(); jizoImg.src = 'jizo.png';
        const onigiriImg = new Image(); onigiriImg.src = 'onigiri.png';

        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const gCanvas = document.createElement('canvas'); gCanvas.width = 256; gCanvas.height = 256;
            const gCtx = gCanvas.getContext('2d'); gCtx.fillStyle = "#a68b6a"; gCtx.fillRect(0,0,256,256);
            for(let i=0; i<80; i++){ gCtx.fillStyle = Math.random() > 0.5 ? "#947a5b" : "#b89c7a"; gCtx.beginPath(); gCtx.arc(Math.random()*256, Math.random()*256, Math.random()*2+1, 0, 7); gCtx.fill(); }
            groundPattern = ctx.createPattern(gCanvas, 'repeat');
            const wCanvas = document.createElement('canvas'); wCanvas.width = 256; wCanvas.height = 256;
            const wCtx = wCanvas.getContext('2d'); wCtx.fillStyle = "#4a4238"; wCtx.fillRect(0,0,256,256);
            for(let i=0; i<80; i++){ wCtx.fillStyle = Math.random() > 0.5 ? "#3d362e" : "#574d41"; wCtx.beginPath(); wCtx.arc(Math.random()*256, Math.random()*256, Math.random()*4+2, 0, 7); wCtx.fill(); }
            wastelandPattern = ctx.createPattern(wCanvas, 'repeat');
        }

        function togglePause() { if (gameState !== 'PLAYING' && !isPaused) return; isPaused = !isPaused; ui.pauseOverlay.style.display = isPaused ? 'block' : 'none'; if (!isPaused) hideExitConfirm(); }
        function showExitConfirm() { isPaused = true; ui.pauseOverlay.style.display = 'block'; ui.confirmDialog.style.display = 'flex'; }
        function hideExitConfirm() { ui.confirmDialog.style.display = 'none'; if (!isPaused) ui.pauseOverlay.style.display = 'none'; }

        function initStage(num) {
            currentStage = num; finalPhase = 0; isPaused = false;
            player = { x: MAP_SIZE/2, y: MAP_SIZE/2 + 300, hp: 3, speed: 6, stunTimer: 0 };
            enemies = []; projectiles = []; effects = []; particles = []; objects = []; items = [];
            
            if(num === 1) { 
                enemies.push(createEnemy(MAP_SIZE/2, MAP_SIZE/2 - 400, 'OKYO', 0)); 
                enemies.push(createEnemy(MAP_SIZE/2 + 200, MAP_SIZE/2 - 400, 'TEPPO', 1)); 
            } else if(num === 2) { 
                enemies.push(createEnemy(MAP_SIZE/2, MAP_SIZE/2 - 400, 'NINJA', 0)); 
                enemies.push(createEnemy(MAP_SIZE/2 + 400, MAP_SIZE/2, 'NINJA', 1)); 
            } else if(num === 3) {
                enemies.push(createEnemy(MAP_SIZE/2, MAP_SIZE/2 - 400, 'NINJA', 0)); 
                enemies.push(createEnemy(MAP_SIZE/2 + 400, MAP_SIZE/2, 'NINJA', 1)); 
                enemies.push(createEnemy(MAP_SIZE/2, MAP_SIZE/2 + 400, 'OKYO', 2));  
                enemies.push(createEnemy(MAP_SIZE/2 - 400, MAP_SIZE/2, 'TEPPO', 3)); 
                objects.push({ x: MAP_SIZE/2 - 550, y: MAP_SIZE/2, type: 'JIZO', used: false }); 
            } else if(num === 4) {
                spawnNinjas(5);
            }
            updateHP(); updateCamera(); gameState = 'STAGE_START'; ui.pauseContainer.style.display = 'none';
            showOverlay(num === 4 ? "FINAL STAGE" : "STAGE "+num, 1500, () => { gameState = 'PLAYING'; ui.pauseContainer.style.display = 'flex'; });
        }

        function spawnNinjas(count, offsetId = 0) {
            const pos = [[0,-400], [400,0], [0,400], [-400,0], [-300,-300]];
            for(let i=0; i<count; i++) enemies.push(createEnemy(MAP_SIZE/2 + pos[i % 5][0], MAP_SIZE/2 + pos[i % 5][1], 'NINJA', offsetId + i));
        }

        function createEnemy(x, y, type, id) {
            let hp = (type === 'OKYO') ? 3 : (type === 'ICHINOSUKE' ? 5 : 1);
            return { id, x, y, type, alive: true, hp, moveStep: 0, pauseTimer: 0, attackPrep: 0, stunTimer: 0, rotation: 0, quotes: [], cooldown: 0, swordGlint: 0, readyTimer: 0, shuriken: { state: 'HELD', myShuriken: null }, blurX: 0, blurY: 0, specialTimer: 0, teppoStep: 0 };
        }

        function updateHP() { let hearts = ""; for(let i=0; i<player.hp; i++) hearts += "❤️"; ui.hp.innerHTML = "HP: " + (player.hp <= 0 ? "💀" : hearts); }
        function showOverlay(txt, dur, cb) { ui.overlay.style.display = 'block'; ui.overlay.innerHTML = txt; setTimeout(() => { ui.overlay.style.display = 'none'; if(cb) cb(); }, dur); }
        function startGame() { ui.title.style.display = 'none'; ui.hp.style.display = 'block'; initStage(1); }
        function resetToTitle() { gameState = 'TITLE'; isPaused = false; ui.title.style.display = 'flex'; ui.end.style.display = 'none'; ui.over.style.display = 'none'; ui.hp.style.display = 'none'; ui.pauseContainer.style.display = 'none'; ui.pauseOverlay.style.display = 'none'; ui.confirmDialog.style.display = 'none'; ui.stunMsg.style.display = 'none'; }

        function update() {
            if (isPaused) return;
            if (gameState === 'PLAYING') {
                if (player.stunTimer > 0) { player.stunTimer--; ui.stunMsg.style.display = 'block'; } else { ui.stunMsg.style.display = 'none'; }
                let moving = false;
                if (joystick.active) {
                    const dx = joystick.curX - joystick.startX, dy = joystick.curY - joystick.startY;
                    const dist = Math.hypot(dx, dy);
                    if (dist > 10) { player.x += (dx/dist)*player.speed; player.y += (dy/dist)*player.speed; moving = true; }
                }
                player.x = Math.max(32, Math.min(MAP_SIZE - 32, player.x));
                player.y = Math.max(32, Math.min(MAP_SIZE - 32, player.y));
                if (moving && frameCount % 8 === 0) addDust(player.x, player.y);
                
                // おにぎりの物理
                items.forEach(it => {
                    if (Math.abs(it.vx) > 0.1 || Math.abs(it.vy) > 0.1) {
                        it.x += it.vx; it.y += it.vy;
                        it.vx *= it.friction; it.vy *= it.friction;
                        it.rotation += (Math.abs(it.vx) + Math.abs(it.vy)) * 0.1;
                    } else { it.vx = 0; it.vy = 0; }
                });

                updateCamera(); updateEnemies(); updateProjectiles();
            }
            updateParticles();
            if (gameState.includes('ENDING')) updateEnding();
        }

        function updateCamera() { camera.x = Math.max(0, Math.min(MAP_SIZE - canvas.width, player.x - canvas.width/2)); camera.y = Math.max(0, Math.min(MAP_SIZE - canvas.height, player.y - canvas.height/2)); }

        function updateEnemies() {
            enemies.forEach(en => {
                if (!en.alive) return;
                const d = Math.hypot(player.x - en.x, player.y - en.y);
                if (en.type === 'NINJA') updateNinja(en, d);
                else if (en.type === 'ICHINOSUKE') updateYojimbo(en, d);
                else if (en.type === 'OKYO') updateOkyo(en, d);
                else if (en.type === 'TEPPO') updateTeppo(en, d);
            });
        }

        function updateTeppo(en, d) {
            if (en.cooldown > 0) { en.cooldown--; return; }
            if (en.pauseTimer > 0) { en.pauseTimer--; return; }
            if (en.attackPrep === 0 && d < 600) { en.attackPrep = 60; en.teppoStep = 1; }
            else if (en.attackPrep > 0) {
                en.attackPrep--;
                if (en.attackPrep === 0) {
                    const a = Math.atan2(player.y - en.y, player.x - en.x);
                    projectiles.push({ x: en.x, y: en.y, vx: Math.cos(a)*7, vy: Math.sin(a)*7, life: 150, type: 'BULLET' });
                    if (en.teppoStep === 1) { en.pauseTimer = 30; en.teppoStep = 2; en.attackPrep = 1; }
                    else { en.quotes.push({t: "弾切れだ", l: 120, c: "yellow"}); en.cooldown = 120; en.teppoStep = 0; }
                }
            }
        }

        function updateNinja(en, d) {
            if (en.stunTimer > 0) { en.stunTimer--; if (en.stunTimer === 0) { en.shuriken.state = 'HELD'; const idx = projectiles.findIndex(p => p === en.shuriken.myShuriken); if(idx !== -1) projectiles.splice(idx, 1); en.shuriken.myShuriken = null; } }
            else if (en.attackPrep > 0) { en.attackPrep--; if (en.attackPrep === 0) { const a = Math.atan2(player.y - en.y, player.x - en.x); const sObj = { x: en.x, y: en.y, vx: Math.cos(a)*5, vy: Math.sin(a)*5, life: 36, type: 'SHURIKEN', ownerId: en.id }; projectiles.push(sObj); en.shuriken.myShuriken = sObj; en.shuriken.state = 'FLYING'; } }
            else if (en.pauseTimer > 0) en.pauseTimer--;
            else {
                if (en.shuriken.state === 'HELD') { if (d < 350) en.attackPrep = 60; else approach(en, player.x, player.y, 3.5, 30, 18); }
                else if (en.shuriken.state === 'DROPPED') { const s = en.shuriken.myShuriken; if (s) { if (Math.hypot(en.x - s.x, en.y - s.y) < 25) { en.stunTimer = 120; en.shuriken.state = 'PICKUP'; return; } approach(en, s.x, s.y, 3.5, 30, 18); } else en.shuriken.state = 'HELD'; }
            }
        }

        function updateOkyo(en, d) {
            if (en.cooldown > 0) { en.cooldown--; if (en.cooldown === 0) { en.quotes.push({t: "お色気よ", l: 60, c: "#ff69b4"}); en.readyTimer = 60; } }
            if (en.readyTimer > 0) en.readyTimer--;
            if (en.pauseTimer > 0) en.pauseTimer--;
            else if (en.attackPrep > 0) {
                en.attackPrep--;
                if (en.attackPrep === 0) {
                    const a = Math.atan2(player.y - en.y, player.x - en.x);
                    projectiles.push({ x: en.x, y: en.y, vx: Math.cos(a)*5, vy: Math.sin(a)*5, life: 60, type: 'KISS', startLife: 60 });
                    en.cooldown = 300; 
                }
            } else {
                if (d < 65) { player.stunTimer = 180; en.pauseTimer = 30; } 
                else if (en.cooldown === 0 && en.readyTimer === 0 && d < 400) { en.attackPrep = 40; en.quotes.push({t: "あら、いい男", l: 60, c: "#ff69b4"}); }
                else approach(en, player.x, player.y, 3.0, 30, 30);
            }
        }

        function updateYojimbo(en, d) {
            if (en.cooldown > 0) { en.cooldown--; if (en.cooldown === 0) { en.quotes.push({t: "装填ッ", l: 60, c: "blue"}); en.readyTimer = 60; } }
            if (en.readyTimer > 0) en.readyTimer--;
            if (en.pauseTimer > 0) en.pauseTimer--;
            else if (en.attackPrep > 0) {
                en.attackPrep--;
                if (en.attackPrep === 0) {
                    if (en.swordGlint > 0) { if (d < 120) hitPlayer(3, true, en); en.swordGlint = 0; }
                    else {
                        const a = Math.atan2(player.y - en.y, player.x - en.x);
                        for(let i=-2; i<=2; i++) projectiles.push({ x: en.x, y: en.y, vx: Math.cos(a+i*0.25)*7, vy: Math.sin(a+i*0.25)*7, life: 80, type: 'BULLET' });
                        en.cooldown = 480;
                    }
                }
            } else {
                if (d < 100) { en.attackPrep = 45; en.swordGlint = 45; }
                else if (en.cooldown === 0 && en.readyTimer === 0 && d < 500) { en.attackPrep = 60; en.quotes.push({t: "鉛玉くらえッ", l: 60, c: "black"}); }
                else approach(en, player.x, player.y, 2.5, 40, 24);
            }
        }

        function approach(en, tx, ty, spd, steps, pause) {
            const a = Math.atan2(ty - en.y, tx - en.x);
            en.x += Math.cos(a)*spd; en.y += Math.sin(a)*spd;
            en.moveStep++; if (en.moveStep % steps === 0) en.pauseTimer = pause;
        }

        function updateProjectiles() {
            projectiles.forEach((p) => {
                if (p.life > 0) {
                    let moveX = p.vx, moveY = p.vy;
                    if (p.type === 'KISS') {
                        const offset = Math.sin((p.startLife - p.life) * 0.2) * 8;
                        const perpA = Math.atan2(p.vy, p.vx) + Math.PI/2;
                        moveX += Math.cos(perpA) * offset; moveY += Math.sin(perpA) * offset;
                    }
                    p.x += moveX; p.y += moveY; p.life--;
                    const dist = Math.hypot(player.x - p.x, player.y - p.y);
                    if (p.type === 'KISS') { if (dist < 40) { hitPlayer(1); p.life = 0; } }
                    else if (dist < 25) { hitPlayer(1); p.life = 0; }
                }
                if (p.life <= 0 && p.type === 'SHURIKEN') {
                    const owner = enemies.find(e => e.id === p.ownerId);
                    if (owner && owner.shuriken.state === 'FLYING') { owner.shuriken.state = 'DROPPED'; p.vx = 0; p.vy = 0; }
                }
            });
        }

        function hitPlayer(dmg, isSword, attacker) {
            if (dmg > 0) { player.hp -= dmg; if (player.hp < 0) player.hp = 0; updateHP(); spawnBlood(player.x, player.y, player.hp <= 0 ? 100 : 20); }
            if (player.hp <= 0) { if (isSword && attacker) attacker.quotes.push({t: "フハハハハ", l: 120, c: "black"}); ui.over.style.display = 'flex'; ui.pauseContainer.style.display = 'none'; ui.stunMsg.style.display = 'none'; gameState = 'GAMEOVER'; }
        }

        function spawnBlood(x, y, count) { for(let i=0; i<count; i++){ const a = Math.random()*7, s = Math.random()*8; particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, c: "red", l: 40, s: Math.random()*4+2 }); } }
        function addDust(x, y) { for(let i=0; i<3; i++) particles.push({ x: x+(Math.random()-0.5)*20, y: y+20, vx: (Math.random()-0.5)*2, vy: -Math.random(), c: "#d2b48c", l: 20, s: Math.random()*3+1 }); }

        function onEnemyDeath(e) {
            const sIdx = projectiles.findIndex(p => p.ownerId === e.id); if(sIdx !== -1) projectiles.splice(sIdx, 1);
            if (currentStage === 4 && finalPhase === 1 && e.type === 'ICHINOSUKE') { triggerClear(); return; }
            if (currentStage === 4 && finalPhase === 0 && enemies.every(n => !n.alive)) {
                finalPhase = 1; showOverlay("市之助、出現ッ！", 1500, () => { 
                    const bos = createEnemy(MAP_SIZE/2, MAP_SIZE/2-400, 'ICHINOSUKE', 99); 
                    bos.quotes.push({t: "地獄へ送ってやるッ", l: 120, c: "black"}); 
                    enemies.push(bos); spawnNinjas(5, 100);
                    enemies.push(createEnemy(MAP_SIZE/2 - 300, MAP_SIZE/2 - 200, 'TEPPO', 201));
                    enemies.push(createEnemy(MAP_SIZE/2 + 300, MAP_SIZE/2 - 200, 'TEPPO', 202));
                    // お地蔵さんを2体設置
                    objects.push({ x: MAP_SIZE/2 - 150, y: MAP_SIZE/2 + 500, type: 'JIZO', used: false });
                    objects.push({ x: MAP_SIZE/2 + 150, y: MAP_SIZE/2 + 500, type: 'JIZO', used: false });
                });
                return;
            }
            if (enemies.every(en => !en.alive)) triggerClear();
        }

        function triggerClear() { gameState = 'STAGE_CLEAR_WAIT'; ui.pauseContainer.style.display = 'none'; setTimeout(() => { showOverlay("STAGE CLEAR", 2000, () => { if(currentStage < 4) initStage(currentStage+1); else startEnding(); }); }, 1000); }

        function startEnding() { gameState = 'ENDING'; endingPhase = 1; endingTimer = 0; ui.end.style.display = 'flex'; ui.endMain.style.display = 'block'; ui.endSub.style.display = 'none'; ui.endHint.style.display = 'none'; }
        function updateEnding() {
            endingTimer++; if (frameCount % 8 === 0) { const fx = Math.random() * canvas.width + camera.x, fy = Math.random() * canvas.height * 0.5 + camera.y; for(let i=0; i<30; i++) { const a = Math.random()*7, s = Math.random()*6+2; particles.push({ x: fx, y: fy, vx: Math.cos(a)*s, vy: Math.sin(a)*s, c: `hsl(${Math.random()*360},100%,50%)`, l: 60, s: Math.random()*5+2 }); } }
            if (endingPhase === 1 && endingTimer > 300) { endingPhase = 2; endingTimer = 0; gameState = 'ENDING_PHASE2'; ui.endMain.style.display = 'none'; ui.endSub.style.display = 'block'; } 
            else if (endingPhase === 2 && endingTimer > 300) { endingPhase = 3; ui.endHint.style.display = 'block'; }
        }
        function onEndingClick() { if (endingPhase === 3) resetToTitle(); }

        function updateParticles() { if (isPaused) return; frameCount++; particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.l--; if (p.l <= 0) particles.splice(i, 1); }); }

        function drawCharacter(img, x, y, size, type, alive) {
            ctx.save(); ctx.translate(x, y); if (!alive) ctx.rotate(Math.PI/2);
            if (img.complete && img.naturalWidth !== 0) { ctx.drawImage(img, -size/2, -size/2, size, size); } 
            else { 
                ctx.fillStyle = (type==='OKYO')?"purple":(type==='PLAYER')?"blue":(type==='TEPPO')?"darkgreen":(type==='JIZO')?"gray":"#222"; 
                ctx.fillRect(-size/2, -size/2, size, size); 
            }
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            if (gameState === 'TITLE' || gameState === 'GAMEOVER' || gameState.includes('ENDING')) return;
            ctx.fillStyle = (currentStage === 4) ? wastelandPattern : groundPattern; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.save(); ctx.translate(-camera.x, -camera.y);
            
            projectiles.forEach(p => { if (p.type === 'SHURIKEN' && p.vx === 0) { ctx.fillStyle = "#777"; ctx.fillRect(p.x-15, p.y-2, 30, 4); ctx.fillRect(p.x-2, p.y-15, 4, 30); } });
            
            items.forEach(it => { 
                ctx.save(); ctx.translate(it.x, it.y); ctx.rotate(it.rotation);
                if (onigiriImg.complete && onigiriImg.naturalWidth !== 0) ctx.drawImage(onigiriImg, -24, -24, 48, 48); 
                else { ctx.fillStyle="white"; ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(-20, 20); ctx.lineTo(20, 20); ctx.fill(); } 
                ctx.restore();
            });
            
            objects.forEach(obj => drawCharacter(jizoImg, obj.x, obj.y, 64, 'JIZO', true));

            enemies.forEach(en => {
                let size = (en.type==='OKYO') ? 128 : (en.type==='TEPPO'? 80 : 64);
                let img = en.type === 'NINJA' ? enemyImg : (en.type === 'ICHINOSUKE' ? yojimboImg : (en.type === 'OKYO' ? okyoImg : (en.type === 'TEPPO' ? teppoImg : shinonomeImg)));
                drawCharacter(img, en.x, en.y, size, en.type, en.alive);
                
                if (en.alive && en.attackPrep > 0) {
                    if (en.type === 'NINJA') { 
                        // 雷エフェクト
                        ctx.strokeStyle = "#00bfff"; ctx.lineWidth = 2; ctx.beginPath();
                        let lx = en.x, ly = en.y - 40; ctx.moveTo(lx, ly);
                        for(let i=0; i<5; i++) { ctx.lineTo(lx + (Math.random()-0.5)*30, ly + i*15); } ctx.stroke();
                    }
                    if (en.type === 'TEPPO') { ctx.fillStyle = "rgba(255,0,0,0.3)"; ctx.beginPath(); ctx.arc(en.x, en.y, 40, 0, 7); ctx.fill(); }
                }
                en.quotes = en.quotes.filter(q => { ctx.fillStyle = q.c; ctx.font = "bold 20px serif"; ctx.textAlign = "center"; ctx.fillText(q.t, en.x, en.y - size/2 - 10); q.l--; return q.l > 0; });
            });

            projectiles.forEach(p => { 
                if (p.life <= 0 && p.type !== 'SHURIKEN') return; if (p.vx === 0 && p.type === 'SHURIKEN') return;
                if (p.type === 'KISS') { ctx.font = "30px serif"; ctx.fillText("💋", p.x-15, p.y+15); }
                else { ctx.fillStyle = p.type==='SHURIKEN'?"#777":"#333"; if (p.type==='SHURIKEN') { ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(frameCount*0.5); ctx.fillRect(-12,-2,24,4); ctx.restore(); } else { ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, 7); ctx.fill(); } } 
            });

            if (player.hp > 0) drawCharacter(playerImg, player.x, player.y, 64, 'PLAYER', true);
            effects = effects.filter(e => { ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(e.x, e.y-40); for(let i=0; i<5; i++) ctx.lineTo(e.x+(Math.random()-0.5)*40, e.y-40+i*15); ctx.stroke(); e.timer--; return e.timer > 0; });
            particles.forEach(p => { ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, p.s, p.s); });
            ctx.restore();
            if (isPaused) { ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0,0,canvas.width,canvas.height); }
            if (gameState === 'PLAYING' && joystick.active) { ctx.beginPath(); ctx.arc(joystick.startX, joystick.startY, 40, 0, 7); ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.stroke(); }
        }

        function handleAction(x, y) {
            if (isPaused) return;
            const wx = x + camera.x, wy = y + camera.y;

            items.forEach((it, i) => {
                if (Math.hypot(wx - it.x, wy - it.y) < 40) {
                    if (player.hp < 3) { player.hp++; updateHP(); items.splice(i, 1); }
                }
            });

            objects.forEach(obj => {
                if (Math.hypot(wx - obj.x, wy - obj.y) < 40 && !obj.used) {
                    // おにぎりを飛ばす（転がる演出）
                    const angle = Math.random() * Math.PI * 2;
                    items.push({ x: obj.x, y: obj.y, vx: Math.cos(angle)*6, vy: Math.sin(angle)*6, friction: 0.92, rotation: 0, type: 'ONIGIRI' });
                    obj.used = true;
                }
            });

            if (player.stunTimer > 0) return;
            enemies.forEach(en => { 
                let size = (en.type==='OKYO') ? 80 : 60;
                if (en.alive && Math.hypot(wx - en.x, wy - en.y) < size && Math.hypot(player.x - en.x, player.y - en.y) < (size + 40)) { 
                    en.hp--; effects.push({ x: en.x, y: en.y, timer: 60 }); 
                    if (en.hp <= 0) { en.alive = false; if (en.type === 'TEPPO') en.quotes.push({t: "おのれ", l: 90, c: "red"}); if (en.type === 'OKYO') en.quotes.push({t: "このねこでなし", l: 120, c: "#ff69b4"}); onEnemyDeath(en); } 
                } 
            });
        }

        resize(); window.addEventListener('resize', resize);
        setInterval(update, 1000/60);
        function drawLoop() { draw(); requestAnimationFrame(drawLoop); }
        drawLoop();
        canvas.addEventListener('mousedown', e => { if (gameState === 'PLAYING') handleAction(e.clientX, e.clientY); joystick = { active: true, startX: e.clientX, startY: e.clientY, curX: e.clientX, curY: e.clientY }; });
        canvas.addEventListener('mousemove', e => { if (joystick.active) { joystick.curX = e.clientX; joystick.curY = e.clientY; } });
        window.addEventListener('mouseup', () => joystick.active = false);
        canvas.addEventListener('touchstart', e => { const t = e.touches[0]; if (gameState === 'PLAYING') handleAction(t.clientX, t.clientY); joystick = { active: true, startX: t.clientX, startY: t.clientY, curX: t.clientX, curY: t.clientY }; });
        canvas.addEventListener('touchmove', e => { if (joystick.active) { e.preventDefault(); joystick.curX = e.touches[0].clientX; joystick.curY = e.touches[0].clientY; } }, { passive: false });
        canvas.addEventListener('touchend', () => joystick.active = false);
    </script>
</body>
